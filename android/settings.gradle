pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
// Avoid relying on `npx` (Gradle daemon PATH can miss it). Run the CLI via node directly.
def nodeBin = null
def candidates = [
  "/opt/homebrew/bin/node",  // Apple Silicon Homebrew
  "/usr/local/bin/node",     // Intel Homebrew
  "/usr/bin/node"            // system (rare)
]
for (p in candidates) {
  if (file(p).exists()) { nodeBin = p; break }
}
def nodeCmd = nodeBin != null ? nodeBin : "/usr/bin/env"
def nodeArgs = nodeBin != null ? [] : ["node"]

def rnCli = file("../node_modules/@react-native-community/cli/build/bin.js")
def cliCmd = rnCli.exists()
  ? ([nodeCmd] + nodeArgs + [rnCli.absolutePath, "config"])
  : ([nodeCmd] + nodeArgs + ["../node_modules/react-native/cli.js", "config"])

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
  ex.autolinkLibrariesFromCommand(cliCmd)
}
rootProject.name = 'app'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
